name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/workflow_automate?schema=public
      STORAGE_MODE: local
      COSTCO_USE_MOCK: "true"
      PPT_TEMPLATE_PATH: templates/costco-ongoing-products.pptx

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: workflow_automate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d workflow_automate"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate PPT template
        run: npm run generate:ppt-template

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Pipeline performance check
        run: npm run verify:pipeline

      - name: Build
        run: npm run build
